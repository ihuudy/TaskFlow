<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header class="hero">
            <h1>TaskFlow</h1>
            <p>Organize suas tarefas de forma simples!</p>
        </header>

        <form method="get" class="form">
            <div class="form_container">
                <h2 class="form_nv">Nova tarefa:</h2>
                <div class="form_add_tarefa">
                    <input type="text" name="tarefa" id="add_tarefa" placeholder="Digite uma tarefa..."
                        class="input_text">
                    <button type="submit" class="btn btn_add">Adicionar</button>
                </div>

                <div class="form_list">
                    <div class="form_btns">
                        <h3>Minhas tarefas:</h3>
                        <button type="button" class="btn btn_delete">Excluir</button>
                        <button type="button" class="btn btn_editar">Editar</button>
                        <div class="link_git">
                            <img src="img/placa-do-github.png" alt="">
                            <a href="https://github.com/ihuudy" target="_blank">Github</a>
                        </div>
                    </div>
                    <div class="list_tarefas">
                        <!-- Exemplo tarefas: Serão adicionadas pelo JavaScript
                        <article class="cards">
                            <input type="checkbox">
                            <label for="tarefa">Tarefa qualquer</label>
                        </article> -->
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="script.js"></script>

</body>

</html>
